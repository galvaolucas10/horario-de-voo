<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Voo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✈️ Simulador de Voo</h1>

<div class="container">

  <div class="campo">
    <p>Origem</p>
    <input type="text" id="origem" placeholder="Ex: São Paulo">
  </div>

  <div class="campo">
    <p>Destino</p>
    <input type="text" id="destino" placeholder="Ex: Rio de Janeiro">
  </div>

  <div class="campo">
    <p>Hora de saída</p>
    <input type="time" id="horaSaida">
  </div>

  <button onclick="calcularVoo()">Calcular Voo</button>

  <div id="resultado"></div>
</div>

<script src="script.js"></script>
    
</body>
</html>
